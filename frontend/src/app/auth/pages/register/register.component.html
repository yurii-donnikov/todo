<div class="auth">
  <form class="auth__form" [formGroup]="form" (ngSubmit)="register()">
    <label class="form-field">
      Name
      <input type="text" formControlName="name" class="form-field__input" />
      @if (form.controls.name.touched && form.controls.name.invalid) {
      <span class="form-field__error">Minimum 2 symbols</span>
      }
    </label>

    <label class="form-field">
      Email
      <input type="email" formControlName="email" class="form-field__input" />
      @if (form.controls.email.touched && form.controls.email.invalid) {
      <span class="form-field__error">incorrect email</span>
      }
    </label>

    <label class="form-field">
      Password
      <input
        type="password"
        formControlName="password"
        class="form-field__input"
      />
      @if (form.controls.password.touched && form.controls.password.invalid) {
      <span class="form-field__error">minimum 6 symbol</span>
      }
    </label>

    <button class="form-submit" type="submit">register</button>

    @if (error$ | async;) {
    <p class="form-error">{{ error$ }}</p>
    }
  </form>
  <p class="auth__link">
    Do you have an account?
    <a routerLink="/login">login</a>
  </p>
</div>
